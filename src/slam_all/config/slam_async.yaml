slam_toolbox:
  ros__parameters:
    use_sim_time: false
    mode: mapping
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    throttle_scans: 1
    transform_timeout: 0.5
    map_update_interval: 2.0
    resolution: 0.05
    max_laser_range: 12.0
    minimum_time_interval: 0.0
